<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Genie</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#161b22;
}

.logo{
font-size:28px;
font-weight:bold;
color:#7c5cff;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:50px;
color:#7c5cff;
}

.hero p{
margin-top:15px;
font-size:20px;
color:#c9d1d9;
}

.search{
margin-top:30px;
}

.search input{
width:80%;
max-width:500px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

.tools{
padding:50px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#161b22;
padding:20px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card h3{
color:#7c5cff;
margin-bottom:10px;
}

footer{
text-align:center;
padding:20px;
background:#161b22;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">🧞 AI Genie</div>
<nav>
<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">About</a>
</nav>
</header>

<section class="hero">
<h1>Find the Best AI Tools</h1>
<p>Your AI Assistant for Every Task 🚀</p>

<div class="search">
<input type="text" placeholder="Search AI Tools...">
</div>
</section>

<section class="tools">
<h2>Popular AI Tools</h2>

<div class="cards">

<div class="card">
<h3>ChatGPT</h3>
<p>AI Chat Assistant</p>
</div>

<div class="card">
<h3>Midjourney</h3>
<p>AI Image Generator</p>
</div>

<div class="card">
<h3>GitHub Copilot</h3>
<p>AI Coding Assistant</p>
</div>

<div class="card">
<h3>Runway ML</h3>
<p>AI Video Generator</p>
</div>

</div>
</section>

<footer>
© 2026 AI Genie | Built by Sanjith
</footer>

</body>
</html>
